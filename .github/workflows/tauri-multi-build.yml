name: Tauri Multi-Platform Build & Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version tag (e.g. v0.1.0)"
        required: true
        default: "v0.1.0"
      release_name:
        description: "Release title"
        required: false
        default: "GenHat Release"

jobs:
  build:
    name: Build on ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
          # - os: ubuntu-latest
          # - os: macos-latest

    runs-on: ${{ matrix.os }}

    env:
      NODE_VERSION: 20

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Setup Node
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Node Dependencies
        run: npm install
        working-directory: genhat-desktop

      # Setup Rust
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      # Linux System Dependencies
      # - name: Install Linux Dependencies
      #   if: matrix.os == 'ubuntu-latest'
      #   run: |
      #     sudo apt update
      #     sudo apt install -y \
      #       libwebkit2gtk-4.1-dev \
      #       libgtk-3-dev \
      #       libayatana-appindicator3-dev \
      #       librsvg2-dev

      # Build Tauri
      - name: Build Tauri App
        run: npx tauri build
        working-directory: genhat-desktop

      # Locate Build Artifacts (Windows) — only GenHat .msi and .exe installers
      - name: Locate Build Artifacts (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $bundleDir = Join-Path $env:GITHUB_WORKSPACE "genhat-desktop/src-tauri/target/release/bundle"
          $files = Get-ChildItem -Path $bundleDir -Recurse -Include "*.msi","*.exe" -ErrorAction SilentlyContinue |
            Where-Object { $_.Name -like "GenHat*" }
          if (-not $files) { Write-Error "No GenHat installers found in $bundleDir"; exit 1 }
          $paths = ($files | ForEach-Object { $_.FullName }) -join "`n"
          echo "ARTIFACT_PATHS<<EOF" >> $env:GITHUB_ENV
          echo $paths >> $env:GITHUB_ENV
          echo "EOF" >> $env:GITHUB_ENV

      # - name: Locate Build Artifact (Linux)
      #   if: matrix.os == 'ubuntu-latest'
      #   run: |
      #     FILE=$(find genhat-desktop/src-tauri/target/release -type f \( -name "*.AppImage" -o -name "*.deb" \) | head -n 1)
      #     echo "ARTIFACT_PATH=$FILE" >> $GITHUB_ENV
      #     echo "ARTIFACT_NAME=$(basename $FILE)" >> $GITHUB_ENV

      # - name: Locate Build Artifact (macOS)
      #   if: matrix.os == 'macos-latest'
      #   run: |
      #     FILE=$(find genhat-desktop/src-tauri/target/release -type f \( -name "*.dmg" \) | head -n 1)
      #     echo "ARTIFACT_PATH=$FILE" >> $GITHUB_ENV
      #     echo "ARTIFACT_NAME=$(basename $FILE)" >> $GITHUB_ENV

      # Upload artifacts to GitHub Release (creates the release if it doesn't exist)
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: ${{ github.event.inputs.release_name }}
          draft: false
          prerelease: false
          files: ${{ env.ARTIFACT_PATHS }}